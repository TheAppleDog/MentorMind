{% extends "base.html" %}

{% block title %}Login - MentorMind{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center align-items-center min-vh-80">
        <div class="col-md-5 col-lg-4">
            <!-- Animated Background Elements -->
            <div style="position: fixed; top: 100px; right: 10%; width: 300px; height: 300px; background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, transparent 70%); border-radius: 50%; animation: float 6s ease-in-out infinite; z-index: -1;"></div>
            
            <div class="card shadow-lg border-0 hover-lift fade-in" style="border-radius: 16px; overflow: hidden; background: white; will-change: auto;">
                <!-- Animated Header -->
                <div class="card-header bg-gradient-primary text-white border-0" style="background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); padding: 2rem 1.5rem; position: relative; z-index: 1;">
                    <div class="text-center">
                        <div style="font-size: 3rem; margin-bottom: 1rem; animation: bounce 2s ease-in-out infinite;">
                            <i class="fas fa-brain"></i>
                        </div>
                        <h2 class="card-title mb-2 fw-bold">Welcome Back</h2>
                        <p class="text-white-50 mb-0">Sign in to your MentorMind account</p>
                    </div>
                </div>

                <div class="card-body p-4" style="position: relative; z-index: 1; background: white;">
                    <form method="POST">
                        <!-- Email Field -->
                        <div class="mb-4 slide-in-left">
                            <label for="email" class="form-label fw-600 mb-2">
                                <i class="fas fa-envelope me-2 text-primary"></i>Email Address
                            </label>
                            <input type="email" class="form-control form-control-lg" id="email" name="email" 
                                   required style="border-radius: 10px;">
                        </div>
                        
                        <!-- Password Field -->
                        <div class="mb-4 slide-in-right">
                            <label for="password" class="form-label fw-600 mb-2">
                                <i class="fas fa-lock me-2 text-primary"></i>Password
                            </label>
                            <div class="input-group">
                                <input type="password" class="form-control form-control-lg" id="password" name="password" 
                                       required style="border-radius: 10px 0 0 10px;">
                                <button class="btn btn-outline-primary" type="button" id="togglePassword" style="border-radius: 0 10px 10px 0;">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>
                        
                        <!-- Remember Me & Forgot Password -->
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="remember" name="remember">
                                <label class="form-check-label fw-500" for="remember">
                                    Remember me
                                </label>
                            </div>
                            <a href="#" class="text-primary text-decoration-none fw-500 hover-lift">Forgot password?</a>
                        </div>
                        
                        <!-- Sign In Button -->
                        <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold mb-3" 
                                style="border-radius: 10px; background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); 
                                        border: none; padding: 0.75rem; transition: all 0.3s ease;">
                            <i class="fas fa-sign-in-alt me-2"></i>Sign In
                        </button>
                    </form>
                    
                    <!-- Divider -->
                    <div class="d-flex align-items-center mb-4">
                        <hr class="flex-grow-1 border-secondary">
                        <span class="px-3 text-muted fw-500">or</span>
                        <hr class="flex-grow-1 border-secondary">
                    </div>
                    
                    <!-- Register Link -->
                    <p class="text-center text-muted mb-0">
                        Don't have an account yet? 
                        <a href="{{ url_for('auth.register') }}" class="text-primary fw-bold text-decoration-none hover-lift">
                            Create one here <i class="fas fa-arrow-right ms-1"></i>
                        </a>
                    </p>
                </div>

                <!-- Animated Footer -->
                <div class="card-footer bg-light border-top-0" style="background: rgba(99, 102, 241, 0.02); padding: 1.5rem; text-align: center;">
                    <small class="text-muted">
                        <i class="fas fa-shield-alt me-1 text-success"></i>Your data is secure and encrypted
                    </small>
                </div>
            </div>

            <!-- Social Login (Optional) -->
            <div class="mt-4 fade-in" style="animation-delay: 0.2s;">
                <p class="text-center text-muted mb-3 fw-500">Or continue with</p>
                <div class="d-flex gap-3 justify-content-center">
                    <button class="btn btn-outline-primary btn-sm rounded-circle hover-lift" style="width: 45px; height: 45px;">
                        <i class="fab fa-google"></i>
                    </button>
                    <button class="btn btn-outline-primary btn-sm rounded-circle hover-lift" style="width: 45px; height: 45px;">
                        <i class="fab fa-github"></i>
                    </button>
                    <button class="btn btn-outline-primary btn-sm rounded-circle hover-lift" style="width: 45px; height: 45px;">
                        <i class="fab fa-linkedin"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Floating Animation Keyframes -->
<style>
    @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-30px); }
    }
    
    .min-vh-80 {
        min-height: 80vh;
    }

    .form-control-lg:focus {
        border-color: #6366f1;
        box-shadow: 0 0 0 0.2rem rgba(99, 102, 241, 0.25);
    }
</style>

<script>
    // Trigger confetti on successful login
    const form = document.querySelector('form');
    form?.addEventListener('submit', function(e) {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        // Email validation
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
            e.preventDefault();
            alert('Please enter a valid email address');
            return;
        }
        
        // Password validation
        if (password.length < 8) {
            e.preventDefault();
            alert('Password must be at least 8 characters');
            return;
        }
        
        if (form.checkValidity() === false) {
            e.preventDefault();
            e.stopPropagation();
        } else {
            // You can trigger confetti here if using canvas-confetti
            confetti?.({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 }
            });
        }
    });

    // Password visibility toggle
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    
    togglePassword?.addEventListener('click', function() {
        const type = passwordInput.type === 'password' ? 'text' : 'password';
        passwordInput.type = type;
        this.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
    });
</script>
{% endblock %}
