<svg width="0" height="0">
  <!-- Gradient Definitions -->
  <defs>
    <linearGradient id="gradientPrimary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="gradientSuccess" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="gradientWarm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Brain Icon -->
  <symbol id="brain-icon" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="45" fill="none" stroke="url(#gradientPrimary)" stroke-width="2"/>
    <path d="M 30 50 Q 30 30 50 25 Q 70 30 70 50" fill="none" stroke="url(#gradientPrimary)" stroke-width="3" stroke-linecap="round"/>
    <circle cx="35" cy="40" r="5" fill="url(#gradientPrimary)" filter="url(#glow)"/>
    <circle cx="50" cy="30" r="5" fill="url(#gradientPrimary)" filter="url(#glow)"/>
    <circle cx="65" cy="40" r="5" fill="url(#gradientPrimary)" filter="url(#glow)"/>
  </symbol>

  <!-- Achievement Badge -->
  <symbol id="badge-icon" viewBox="0 0 100 100">
    <polygon points="50,10 65,35 92,35 73,52 82,77 50,60 18,77 27,52 8,35 35,35" fill="url(#gradientWarm)" filter="url(#shadow)"/>
    <circle cx="50" cy="45" r="15" fill="white" opacity="0.9"/>
    <text x="50" y="50" text-anchor="middle" font-size="20" fill="url(#gradientWarm)" font-weight="bold">✓</text>
  </symbol>

  <!-- Growth Chart -->
  <symbol id="growth-icon" viewBox="0 0 100 100">
    <rect x="10" y="60" width="15" height="30" fill="url(#gradientPrimary)" opacity="0.7"/>
    <rect x="30" y="40" width="15" height="50" fill="url(#gradientPrimary)" opacity="0.8"/>
    <rect x="50" y="20" width="15" height="70" fill="url(#gradientPrimary)"/>
    <rect x="70" y="30" width="15" height="60" fill="url(#gradientSuccess)"/>
    <polyline points="17,60 37,40 57,20 77,30" fill="none" stroke="url(#gradientSuccess)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- Target Icon -->
  <symbol id="target-icon" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="45" fill="none" stroke="url(#gradientPrimary)" stroke-width="2"/>
    <circle cx="50" cy="50" r="30" fill="none" stroke="url(#gradientPrimary)" stroke-width="2" opacity="0.6"/>
    <circle cx="50" cy="50" r="15" fill="url(#gradientPrimary)"/>
    <circle cx="50" cy="50" r="8" fill="white"/>
  </symbol>

  <!-- Rocket Icon -->
  <symbol id="rocket-icon" viewBox="0 0 100 100">
    <path d="M 50 10 L 60 35 L 40 35 Z" fill="url(#gradientSuccess)"/>
    <path d="M 35 40 Q 40 45 50 45 Q 60 45 65 40 L 65 70 Q 50 75 35 70 Z" fill="url(#gradientPrimary)"/>
    <circle cx="50" cy="50" r="8" fill="white" opacity="0.8"/>
    <path d="M 30 70 L 25 90 L 35 75 Z" fill="url(#gradientWarm)"/>
    <path d="M 70 70 L 75 90 L 65 75 Z" fill="url(#gradientWarm)"/>
  </symbol>

  <!-- People/Network Icon -->
  <symbol id="network-icon" viewBox="0 0 100 100">
    <circle cx="30" cy="25" r="8" fill="url(#gradientPrimary)"/>
    <circle cx="70" cy="25" r="8" fill="url(#gradientSuccess)"/>
    <circle cx="50" cy="65" r="8" fill="url(#gradientWarm)"/>
    <path d="M 30 33 Q 50 45 70 33" fill="none" stroke="url(#gradientPrimary)" stroke-width="2" stroke-linecap="round"/>
    <path d="M 30 33 L 50 57" fill="none" stroke="url(#gradientSuccess)" stroke-width="2" stroke-linecap="round"/>
    <path d="M 70 33 L 50 57" fill="none" stroke="url(#gradientWarm)" stroke-width="2" stroke-linecap="round"/>
  </symbol>

  <!-- Lightbulb Icon -->
  <symbol id="idea-icon" viewBox="0 0 100 100">
    <ellipse cx="50" cy="35" rx="20" ry="25" fill="url(#gradientWarm)"/>
    <rect x="35" y="55" width="30" height="8" fill="url(#gradientPrimary)"/>
    <path d="M 38 63 L 35 75" stroke="url(#gradientPrimary)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 50 63 L 50 75" stroke="url(#gradientPrimary)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 62 63 L 65 75" stroke="url(#gradientPrimary)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <circle cx="45" cy="25" r="3" fill="white" opacity="0.8"/>
  </symbol>
</svg>
